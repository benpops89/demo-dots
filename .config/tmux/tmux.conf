set -g default-terminal "tmux-256color"
set -as terminal-overrides ",xterm*:Tc"

set -g prefix C-a
unbind C-b
bind C-a send-prefix

set -g mouse on
set -g base-index 1
set -g pane-base-index 1
set -sg escape-time 0

set -g status-position bottom
set -g status-style bg=colour235,fg=colour223
set -g status-left ""
set -g status-right " %H:%M "
set -g status-right-style fg=colour223,bold
set -g status-interval 1

set -g window-status-style fg=colour244
set -g window-status-current-style fg=colour223,bold
set -g window-status-format " #I:#W "
set -g window-status-current-format " #I:#W "

set -g pane-border-style fg=colour238
set -g pane-active-border-style fg=colour142

set -g mode-keys vi
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
